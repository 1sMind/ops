services:
  nginx:
    image: nginx:latest
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./50x.html:/usr/share/nginx/html/50x.html
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    
    
  app1:
    # build: .
    image: ${APP_IMAGE}:${APP_VERSION}
    restart: always
    environment:
      MESSAGE: "${APP1_MESSAGE}"
      PORT: ${APP_CONTAINER_PORT}
      REDIS_HOST: "${REDIS_HOST}"
    volumes:
      - ./app.py:/app/app.py
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 3s
      retries: 3

  app2:
    # build: .
    image: ${APP_IMAGE}:${APP_VERSION}
    restart: always
    environment:
      MESSAGE: "${APP2_MESSAGE}"
      PORT: ${APP_CONTAINER_PORT}
      REDIS_HOST: "${REDIS_HOST}"
    volumes:
      - ./app.py:/app/app.py
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${APP_CONTAINER_PORT}/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
  
  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  redis_data: