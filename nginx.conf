events {}

http {
    upstream backend {
        server app1:8080;
        server app2:8080;
    }
    server {
        listen 80;
        location / {
            proxy_pass http://backend; 
        }

        error_page 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}